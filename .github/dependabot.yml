# MANAGED BY shunsock/github_central — このファイルは gh-infra で rust-cli グループへ配信される。
# 変更は github_central 側の files/rust_cli_repository/dependabot.yml で行うこと。
# 直接編集しても同期で上書きされうる。
#
# cargo と github-actions を監視し、minor / patch は group 化して auto-merge 対象にする。
# major は group に載らず個別 PR となり、auto-merge されず人間のレビューに回る。
# cooldown: リリース直後の不安定・供給網リスクを避けるため minor/patch は 7日、
# 破壊的変更を含みうる major は 14日 寝かせてから PR を作る。
version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      minor:
        update-types:
          - "minor"
      patch:
        update-types:
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    # github-actions は semver 粒度の cooldown (semver-major-days 等) を
    # サポートしないため default-days のみ指定する。
    cooldown:
      default-days: 7
    # github_central が配信する managed workflow (lint__* / auto_merge__*) が使う
    # アクションを ignore する。これらのバージョンは中央 (workflows/) が single source
    # of truth で、更新は github_central 側の PR で明示的に行う。下流の Dependabot が
    # managed ファイルを bump して merge すると、apply が中央値へ戻そうとして drift の
    # 綱引きになるため止める。ワークフローの安全性 (危険な変更の検知) は managed の
    # lint__github_actions が走らせる zizmor が担保するので、ここで更新を止めても穴は
    # 空かない。Dependabot は github-actions でファイル単位の除外ができないため、
    # dependency-name 単位で ignore する (自前 workflow の同一アクションも対象になる)。
    ignore:
      - dependency-name: "actions/checkout"
      - dependency-name: "dependabot/fetch-metadata"
      - dependency-name: "zizmorcore/zizmor-action"
    groups:
      minor:
        update-types:
          - "minor"
      patch:
        update-types:
          - "patch"
